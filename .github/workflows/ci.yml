name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nanobind fsspec scikit-build-core

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake ..

    - name: Build
      run: cmake --build build --parallel 4

    - name: Test Python module
      run: |
        cd build
        python -c "import sys; sys.path.insert(0, '.'); import _fsspec_cpp; print('Python module OK')"

    - name: Test C API (Simple)
      run: |
        cd build
        ./test_python

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.python-version }}
        path: |
          build/libfsspec_c.so
          build/_fsspec_cpp*.so

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nanobind fsspec scikit-build-core

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake ..

    - name: Build
      run: cmake --build build --parallel 4

    - name: Test Python module
      run: |
        cd build
        python -c "import sys; sys.path.insert(0, '.'); import _fsspec_cpp; print('Python module OK')"
